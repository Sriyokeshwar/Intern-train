<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .aero{
            animation-name:fly;
            position:relative;
            animation-duration: 1s;
        }
        @keyframes fly{
            0%{
                left:0%; 
            }
            100%{
                left: 90%; 
            }
        }
        .train{
            animation-name:chik;
            position:relative;
            animation-duration: 2s;
        }
        @keyframes chik{
          0%{
                left:0%; 
            }
            100%{
                left: 90%; 
            }      
        }
        .bus{
            animation-name:ssss;
            position:relative;
            animation-duration:4s ;
                }
        @keyframes ssss{
          0%{
                left:10%; 
            }
            100%{
                left: 90%; 
            }      
        }
        .car{
            animation-name:rrrr;
            position:relative;
            animation-duration: 6s;
        }
        @keyframes rrrr{
          0%{
                left:0%; 
            }
            100%{
                left: 90%; 
            }      
        }
        .cycle{
            animation-name:ssss;
            position:relative;
            animation-duration: 8s;
        }
        @keyframes ssss{
          0%{
                left:0%; 
            }
            100%{
                left: 90%; 
            }      
        }

    </style>
</head>
<body>
    <img class="aero" src="./src/aeroplane.png" width="150" ><br>
     <img class="train" src="./src/train.png" alt="" width="150"><br>
     <img class="bus" src="./src/bus.png" width="100"><br>
     <img class="car" src="./src/car.png" width="100"><br> 
     <img class="cycle" src="./src/cycle.png" alt="" width="100"> 
</body>
</html>
