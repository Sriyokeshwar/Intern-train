<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .shape{
            width:150px;
            height:150px;
            top:300px;
            left:600px;
            animation-name: move;
            position:relative;
            background-color:red;
            animation-duration:3s;
            animation-delay:1s;
            animation-direction:alternate-reverse;
            animation-iteration-count: infinite;
        }
        @keyframes move{
            0%{
                top:150px;
                left:300px;
            }
            25%{
                left:500px;
                top:300px;
            }
            50%{
                top:150px;
                left:700px;
            }
            75%{
                top:300px;
                left:900px
            }
            100%{
                left:1100px;
                top:150px;
                border-radius:50%;
            }
        }
    </style>
</head>
<body>
    <div class="shape">

    </div>
</body>
</html>
