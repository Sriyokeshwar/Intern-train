<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Document</h1>
    </header>
    <main>
        <h1>Text Formatting</h1>
        <ul>
            <li><b>Bold</b></li>
            <li><i>Italic</i></li>
            <li><u>Underline</u></li>
            <li><s>Strikethrough</s></li>
            <li><mark>Highlight</mark></li>
            <li>H<sub>2</sub>O</li>
            <li>E=mc<sup>2</sup></li>
        </ul>

        <h1 style="background-color: lightblue;">Block Elements</h1>
        <b style="background-color: lightgreen;">This is a block element.</b>

        <br>
        <center>
        <h1> media tags</h1>
        <img src="./src/img.png"    alt="Image" width="200"> <br>
        <audio src="./src/aud.mp3" controls muted loop ></audio> <br>
        <video src="./src/vid.mp4" controls width="320" autoplay muted loop ></video>
        </main>
        </center>

        <form style="background-color: rgba(0,0,0,0.7); padding: 10px;">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Name" required><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="sri@ggmail.com" readonly placeholder="Email"><br>
            <input type="checkbox" id="subscribe" name="subscribe">
            <label for="subscribe">Subscribe to newsletter</label><br>
            <input type="radio" id="option1" name="options" value="option1">
            <label for="option1">Option 1</label><br>
            <input type="radio" id="option2" name="options" value="option2">
            <label for="option2">Option 2</label><br>
            <input type="date" id="date" name="date"><br>
            <input type="color" id="color" name="color"><br>
            <input type="time" id="time" name="time"><br>
            <input type="range" id="range" name="range" min="0" max="100"><br>
            <select id="dropdown" name="dropdown">
                <option value="option1">Option 1</option>
                <option value="option2">Option 2</option>
                <option value="option3">Option 3</option>
            </select><br>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="Your message here..."></textarea><br>
            <input type="submit" value="Submit">

        </form>
        <br>
        <div style="background-color: lightcoral; padding: 10px; height:200px;">
            <div style="background-color: lightyellow; padding: 10px; height:100px; width:100px;">
             Nested div element. <span style="color: red;">Span inline.</span>
            </div>
        </div><br>
    </main>

    <center>
        <table border="2" cellpadding="10" cellspacing="10">
            <tbody>
                <tr>
                    <td colspan="2">Header</td>
                </tr>
                <tr>
                    <td colspan="2">Nav</td>
                </tr>
                <tr>
                    <td>section</td>
                    <td rowspan="2">Aside</td>
                </tr>
                <tr>
                    <td>article</td>
                </tr>
                <tr>
                    <td colspan="2">Footer</td>
                </tr>
            </tbody>
        </table>
</body>
</html>
