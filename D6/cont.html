<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container</title>
    <style>
        body{
            display:flex;
            height:100vh;
            align-items: center;
            justify-content:center;
            border:2px solid gray;
            display:flex;
        }
        .b1{
            width:50%;
            height:auto;
            align-items: center;
            justify-content:center;
            border:2px solid blue;
            padding:10px;
        }
        .box{
            width:70px;
            height:70px;
            border:2px solid black;
        }
        .in1,.in5{
            display:flex;
            margin:30px;
            justify-content: space-between;
        }
        .in2,.in4{
            display:flex;
            justify-content:space-around;
            margin:30px;
        }
        .in3{
            display:flex;
            margin:30px;
            justify-content:center;
        }
    </style>
</head>
<body>
    <div class="b1">
        <div class="in1">
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="in2">
                <div class="box"></div>
                <div class="box"></div>
        </div>
        <div class="in3">
            <div class="box"></div>
        </div>
        <div class="in4">
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="in5">
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
